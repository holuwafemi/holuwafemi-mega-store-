<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holuwafemi Mega Store</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
:root{
  --primary:#ff9900;
  --dark:#1a1a1a;
}

/* BODY */
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
  padding:20px;
  text-align:center;
}

/* NAV */
nav{
  background:#222;
  padding:12px;
  text-align:center;
  position:sticky;
  top:0;
}
nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
  font-size:13px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:20px;
  max-width:1300px;
  margin:auto;
}

/* CARD */
.product{
  background:white;
  border-radius:12px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  transition:0.3s;
  position:relative;
}
.product:hover{
  transform:translateY(-5px);
}

/* BADGE */
.product::before{
  content:"HOT";
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  color:white;
  font-size:10px;
  padding:4px 7px;
  border-radius:5px;
}

/* IMAGE */
.main-img{
  width:100%;
  height:180px;
  object-fit:contain;
  background:#f9f9f9;
  border-radius:10px;
  padding:10px;
}

/* TEXT */
.product h3{
  font-size:14px;
  margin:8px 0;
}

.product p{
  color:#ff9900;
  font-weight:bold;
}

/* BUTTON */
.btn-pay{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:6px;
  cursor:pointer;
}
.btn-pay:hover{
  background:#e68a00;
}

/* CART */
#cart-icon{
  position:fixed;
  bottom:20px;
  right:20px;
  background:linear-gradient(135deg,#ff9900,#ff5e00);
  color:white;
  padding:14px 20px;
  border-radius:40px;
  cursor:pointer;
}

/* MODAL */
#cart-modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  top:0;
}

.modal-content{
  background:white;
  max-width:400px;
  margin:50px auto;
  padding:20px;
  border-radius:10px;
}

.input-field{
  width:100%;
  padding:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>Holuwafemi Mega Store</h1>
<p>Solar • Electronics • Appliances • Phones</p>
</header>

<nav>
<a href="#solar">Solar</a>
<a href="#electronics">Electronics</a>
<a href="#phones">Phones</a>
</nav>

<div id="cart-icon" onclick="toggleCart()">🛒 (<span id="cart-count">0</span>)</div>

<!-- PRODUCTS -->
<section class="products">

<div class="product">
<img src="Solar Panel.jpg" class="main-img">
<h3>300W Solar Panel</h3>
<p>₦65,000</p>
<button onclick="addToCart('300W Solar Panel',65000)" class="btn-pay">ADD TO CART</button>
</div>

<div class="product">
<img src="stv.jpg" class="main-img">
<h3>Sunking Solar TV</h3>
<p>₦250,000</p>
<button onclick="addToCart('Solar TV',250000)" class="btn-pay">ADD TO CART</button>
</div>

<div class="product">
<img src="4g.jpg" class="main-img">
<h3>4G Camera</h3>
<p>₦80,000</p>
<button onclick="addToCart('4G Camera',80000)" class="btn-pay">ADD TO CART</button>
</div>

<div class="product">
<img src="street.jpg" class="main-img">
<h3>Solar Streetlight</h3>
<p>₦45,000</p>
<button onclick="addToCart('Streetlight',45000)" class="btn-pay">ADD TO CART</button>
</div>

<div class="product">
<img src="smarttv.jpg" class="main-img">
<h3>32-inch Smart TV</h3>
<p>₦145,000</p>
<button onclick="addToCart('TV',145000)" class="btn-pay">ADD TO CART</button>
</div>

<div class="product">
<img src="iPhone11.jpg" class="main-img">
<h3>iPhone 11</h3>
<p>₦320,000</p>
<button onclick="addToCart('iPhone',320000)" class="btn-pay">ADD TO CART</button>
</div>

</section>

<!-- CART -->
<div id="cart-modal">
<div class="modal-content">
<h2>Cart</h2>
<div id="cart-items"></div>

<input id="email" class="input-field" placeholder="Email">
<input id="phone" class="input-field" placeholder="Phone">
<input id="address" class="input-field" placeholder="Address">

<button onclick="pay()" class="btn-pay">PAY</button>
</div>
</div>

<script>
let cart=[];

function addToCart(name,price){
cart.push({name,price});
updateCart();
alert(name+" added");
}

function updateCart(){
document.getElementById("cart-count").innerText=cart.length;

let list="";
let total=0;

cart.forEach(item=>{
list+=`<p>${item.name} - ₦${item.price}</p>`;
total+=item.price;
});

list+=`<h3>Total: ₦${total}</h3>`;

document.getElementById("cart-items").innerHTML=list;
}

function toggleCart(){
let modal=document.getElementById("cart-modal");
modal.style.display = modal.style.display==="block"?"none":"block";
}

function pay(){
alert("Payment Ready (Paystack still connected)");
}
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAl6irx9QKiJeHJ2Xu2VUkNUJyNy2ud6cg",
    authDomain: "holuwafemi-mega-store.firebaseapp.com",
    projectId: "holuwafemi-mega-store",
    storageBucket: "holuwafemi-mega-store.firebasestorage.app",
    messagingSenderId: "1002214759367",
    appId: "1:1002214759367:web:0f3afecb88c0f8a0f397e2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function syncFirebasePrices() {
    const querySnapshot = await getDocs(collection(db, "products"));
    
    querySnapshot.forEach((doc) => {
      const fbProduct = doc.data();
      const allProductCards = document.querySelectorAll('.product');

      allProductCards.forEach((card) => {
        const title = card.querySelector('h3').innerText;
        
        // If the name in Firebase matches the name on the screen
        if (title.includes(fbProduct.name)) {
          // Update the Price Display
          card.querySelector('p').innerText = `₦${fbProduct.price.toLocaleString()}`;
          
          // Update the "Add to Cart" button so it charges the correct amount
          const button = card.querySelector('button');
          button.setAttribute('onclick', `addToCart('${fbProduct.name}', ${fbProduct.price})`);
        }
      });
    });
  }

  // Run the sync when the page loads
  syncFirebasePrices();
</script>
  
</body>
  </html>
