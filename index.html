<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holuwafemi Mega Store | Official</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root { --jumia-orange: #f68b1e; --flash-red: #e61601; --bg: #f1f1f2; }
    body { margin: 0; font-family: Roboto, sans-serif; background: var(--bg); padding-bottom: 70px; }
    
    /* SEARCH BAR */
    .header-top { background: white; padding: 10px; display: flex; align-items: center; position: sticky; top: 0; z-index: 2000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .search-box { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: #f1f1f2; display: flex; align-items: center; }
    .search-box input { border: none; background: transparent; width: 100%; outline: none; margin-left: 10px; }

    /* FLASH SALES & TIMER */
    .flash-banner { background: var(--flash-red); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .timer-box { font-size: 14px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 4px; border: 1px solid white; }

    /* GRID */
    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
    @media (min-width: 768px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }

    /* PRODUCT CARD */
    .product { background: white; border-radius: 4px; padding: 10px; position: relative; display: flex; flex-direction: column; cursor: pointer; }
    
    /* HOT BADGE */
    .hot-badge { position: absolute; top: 10px; left: 10px; background: red; color: white; font-size: 10px; padding: 4px 8px; border-radius: 3px; font-weight: bold; z-index: 5; }
    
    /* DISCOUNT TAG */
    .discount-tag { position: absolute; top: 10px; right: 10px; background: #feefdf; color: var(--jumia-orange); font-size: 11px; padding: 2px 5px; border-radius: 2px; font-weight: bold; z-index: 5; }
    
    .img-container { width: 100%; height: 150px; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
    .main-img { width: 100%; height: 100%; object-fit: contain; transition: 0.3s; }
    .product:hover .main-img { transform: scale(1.1); }

    .product h3 { font-size: 13px; font-weight: normal; margin: 8px 0 4px; height: 32px; overflow: hidden; color: #333; }
    .price { font-size: 16px; font-weight: bold; color: #282828; }
    .old-price { font-size: 12px; color: #75757a; text-decoration: line-through; }

    .btn-cart { background: var(--jumia-orange); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 12px; transition: 0.2s; }
    .btn-cart:hover { background: #e67e00; }

    /* BOTTOM NAV */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; z-index: 2000; }
    .nav-item { text-align: center; color: #75757a; font-size: 11px; text-decoration: none; position: relative; }
    .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
    .nav-item.active { color: var(--jumia-orange); }
    #cart-badge { position: absolute; top: -5px; right: 5px; background: var(--jumia-orange); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }

    /* LIGHTBOX */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; }
    #lightbox img { max-width: 90%; max-height: 80%; border-radius: 8px; border: 2px solid white; }
  </style>
</head>
<body>

<div class="header-top">
  <div class="search-box">
    <i class="fas fa-search" style="color:#75757a"></i>
    <input type="text" placeholder="Search Holuwafemi Mega Store">
  </div>
</div>

<div class="flash-banner">
  <span>⚡ FLASH SALES</span>
  <div class="timer-box" id="countdown">00h : 00m : 00s</div>
</div>

<section class="products-grid">
  <div class="product">
    <div class="hot-badge">HOT</div>
    <span class="discount-tag">-15%</span>
    <div class="img-container" onclick="openLightbox('Solar Panel.jpg')">
      <img src="Solar Panel.jpg" class="main-img">
    </div>
    <h3>300W Solar Panel - Brand New</h3>
    <div class="price">₦65,000</div>
    <div class="old-price">₦76,500</div>
    <button onclick="addToCart('300W Solar Panel', 65000)" class="btn-cart">ADD TO CART</button>
  </div>

  <div class="product">
    <div class="hot-badge">HOT</div>
    <span class="discount-tag">-10%</span>
    <div class="img-container" onclick="openLightbox('stv.jpg')">
      <img src="stv.jpg" class="main-img">
    </div>
    <h3>Sunking Solar TV 32-inch Kit</h3>
    <div class="price">₦250,000</div>
    <div class="old-price">₦275,000</div>
    <button onclick="addToCart('Solar TV', 250000)" class="btn-cart">ADD TO CART</button>
  </div>

  <div class="product">
    <div class="hot-badge">HOT</div>
    <span class="discount-tag">-47%</span>
    <div class="img-container" onclick="openLightbox('powerbank.jpg')">
      <img src="powerbank.jpg" class="main-img">
    </div>
    <h3>20,000mAh Ultra Slim Powerbank</h3>
    <div class="price">₦12,500</div>
    <div class="old-price">₦23,500</div>
    <button onclick="addToCart('Powerbank', 12500)" class="btn-cart">ADD TO CART</button>
  </div>

  <div class="product">
    <div class="hot-badge">HOT</div>
    <span class="discount-tag">-5%</span>
    <div class="img-container" onclick="openLightbox('iPhone11.jpg')">
      <img src="iPhone11.jpg" class="main-img">
    </div>
    <h3>Apple iPhone 11 - 64GB Unlocked</h3>
    <div class="price">₦320,000</div>
    <div class="old-price">₦336,000</div>
    <button onclick="addToCart('iPhone 11', 320000)" class="btn-cart">ADD TO CART</button>
  </div>
</section>

<div id="lightbox" onclick="this.style.display='none'">
  <img id="light-img" src="">
</div>

<div class="bottom-nav">
  <a href="#" class="nav-item active"><i class="fas fa-home"></i>Home</a>
  <a href="#" class="nav-item"><i class="fas fa-th-large"></i>Categories</a>
  <a href="javascript:void(0)" class="nav-item">
    <i class="fas fa-shopping-cart"></i>Cart
    <span id="cart-badge">0</span>
  </a>
  <a href="#" class="nav-item"><i class="fas fa-user-circle"></i>Account</a>
</div>

<script>
  let cartCount = 0;

  function addToCart(name, price) {
    cartCount++;
    document.getElementById("cart-badge").innerText = cartCount;
    alert(name + " added to cart!");
  }

  function openLightbox(src) {
    document.getElementById("light-img").src = src;
    document.getElementById("lightbox").style.display = "flex";
  }

  // RE-ADDING THE TIMER LOGIC
  function startFlashSale() {
    let hours = 5, minutes = 24, seconds = 59;
    const timerElement = document.getElementById("countdown");
    
    setInterval(() => {
      seconds--;
      if (seconds < 0) { seconds = 59; minutes--; }
      if (minutes < 0) { minutes = 59; hours--; }
      
      timerElement.innerText = 
        `${hours.toString().padStart(2, '0')}h : ${minutes.toString().padStart(2, '0')}m : ${seconds.toString().padStart(2, '0')}s`;
    }, 1000);
  }
  startFlashSale();
</script>

</body>
</html>
