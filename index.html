<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holuwafemi Mega Store | Payments Live</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    :root { --orange: #f68b1e; --red: #e61601; --bg: #f1f1f2; }
    body { margin: 0; font-family: Roboto, sans-serif; background: var(--bg); padding-bottom: 70px; }
    
    .header { background: white; padding: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .search-box { background: #f1f1f2; padding: 10px; border-radius: 4px; display: flex; align-items: center; }
    .search-box input { border: none; background: transparent; width: 100%; margin-left: 10px; outline: none; }

    .cat-bar { background: white; overflow-x: auto; white-space: nowrap; padding: 10px; border-bottom: 1px solid #ddd; display: flex; gap: 15px; }
    .cat-item { text-decoration: none; color: #333; font-size: 13px; font-weight: bold; cursor: pointer; padding: 5px 10px; border-radius: 4px; }
    .cat-item.active { background: var(--orange); color: white; }

    .flash-sale { background: var(--red); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .timer { background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; font-size: 14px; }

    .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
    .product { background: white; border-radius: 4px; padding: 10px; position: relative; display: flex; flex-direction: column; }
    .hot { position: absolute; top: 5px; left: 5px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 2px; font-weight: bold; z-index: 5; }
    .discount { position: absolute; top: 5px; right: 5px; background: #feefdf; color: var(--orange); font-size: 11px; padding: 2px 4px; font-weight: bold; z-index: 5; }
    
    .product img { width: 100%; height: 140px; object-fit: contain; }
    .product h3 { font-size: 13px; font-weight: normal; margin: 8px 0; height: 32px; overflow: hidden; }
    .price { font-size: 16px; font-weight: bold; }
    .old-price { font-size: 12px; color: #75757a; text-decoration: line-through; }

    .add-btn { background: var(--orange); color: white; border: none; padding: 10px; border-radius: 4px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; }

    /* CART UI */
    #cart-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; }
    .cart-content { background: white; width: 90%; max-width: 400px; margin: 30px auto; padding: 20px; border-radius: 8px; position: relative; }
    .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    .input-field { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
    .nav-link { text-align: center; color: #75757a; font-size: 11px; cursor: pointer; position: relative; text-decoration: none; }
    #badge { position: absolute; top: -5px; right: 0px; background: var(--orange); color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
  </style>
</head>
<body>

<div class="header">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="Search for electronics, solar...">
  </div>
</div>

<div class="cat-bar" id="category-links">
  <div class="cat-item active" onclick="filterItems('all', this)">ALL</div>
  <div class="cat-item" onclick="filterItems('solar', this)">SOLAR</div>
  <div class="cat-item" onclick="filterItems('electronics', this)">ELECTRONICS</div>
  <div class="cat-item" onclick="filterItems('phones', this)">PHONES</div>
</div>

<div class="flash-sale">
  <span>⚡ FLASH SALES</span>
  <div class="timer" id="clock">00h : 00m : 00s</div>
</div>

<div class="products-grid" id="product-list"></div>

<div id="cart-modal">
  <div class="cart-content">
    <h3>My Shopping Cart</h3>
    <div id="cart-items-list"></div>
    <div id="cart-total" style="font-weight:bold; margin-top:15px; font-size:18px; color:var(--orange);">Total: ₦0</div>
    
    <input type="email" id="email" class="input-field" placeholder="Your Email Address" required>
    
    <button class="add-btn" onclick="payWithPaystack()">PAY NOW</button>
    <button onclick="toggleCart()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Close</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-link" onclick="location.reload()"><i class="fas fa-home"></i>Home</div>
  <div class="nav-link" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i>Cart<span id="badge">0</span></div>
</div>

<script>
  // YOUR PRODUCT DATABASE
  const products = [
    { name: "300W Solar Panel", price: 65000, old: 76500, img: "Solar Panel.jpg", cat: "solar", hot: true },
    { name: "Sunking Solar TV", price: 250000, old: 275000, img: "stv.jpg", cat: "solar", hot: true },
    { name: "iPhone 11 64GB", price: 320000, old: 340000, img: "iPhone11.jpg", cat: "phones", hot: false },
    { name: "4G Camera", price: 80000, old: 95000, img: "4g.jpg", cat: "electronics", hot: true },
    { name: "Smart TV 32\"", price: 145000, old: 160000, img: "smarttv.jpg", cat: "electronics", hot: false },
    { name: "Djack Audio", price: 48000, old: 55000, img: "Djack.jpg", cat: "electronics", hot: true }
  ];

  let cart = [];

  function renderProducts(items) {
    const container = document.getElementById('product-list');
    container.innerHTML = items.map(p => `
      <div class="product">
        ${p.hot ? '<div class="hot">HOT</div>' : ''}
        <div class="discount">-${Math.round((1 - p.price/p.old) * 100)}%</div>
        <img src="${p.img}" onclick="alert('Viewing Detail')">
        <h3>${p.name}</h3>
        <div class="price">₦${p.price.toLocaleString()}</div>
        <div class="old-price">₦${p.old.toLocaleString()}</div>
        <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">ADD TO CART</button>
      </div>
    `).join('');
  }

  function filterItems(cat, element) {
    const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
    renderProducts(filtered);
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
  }

  function addToCart(name, price) {
    cart.push({name, price});
    updateCartUI();
    alert(name + " added!");
  }

  function updateCartUI() {
    document.getElementById('badge').innerText = cart.length;
    const list = document.getElementById('cart-items-list');
    list.innerHTML = cart.map(item => `
      <div class="cart-item"><span>${item.name}</span> <span>₦${item.price.toLocaleString()}</span></div>
    `).join('');
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    document.getElementById('cart-total').innerText = `Total: ₦${total.toLocaleString()}`;
  }

  function toggleCart() {
    const modal = document.getElementById('cart-modal');
    modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
  }

  // --- REAL PAYSTACK FUNCTION ---
  function payWithPaystack() {
    const email = document.getElementById('email').value;
    const totalAmount = cart.reduce((sum, item) => sum + item.price, 0);

    if (!email) { alert("Please enter your email!"); return; }
    if (totalAmount <= 0) { alert("Cart is empty!"); return; }

    const handler = PaystackPop.setup({
      key: 'pk_live_xxxxxxxxxxxxxxxxxxxxxxxxxxxx', // REPLACE WITH YOUR LIVE KEY
      email: email,
      amount: totalAmount * 100, // Paystack works in kobo
      currency: "NGN",
      callback: function(response) {
        alert('Payment Successful! Reference: ' + response.reference);
        cart = []; // Clear cart after success
        updateCartUI();
        toggleCart();
      },
      onClose: function() {
        alert('Payment Window Closed.');
      }
    });
    handler.openIframe();
  }

  function startTimer() {
    let h = 5, m = 24, s = 59;
    setInterval(() => {
      s--; if(s<0){s=59; m--;} if(m<0){m=59; h--;}
      document.getElementById('clock').innerText = `${h}h : ${m}m : ${s}s`;
    }, 1000);
  }

  renderProducts(products);
  startTimer();
</script>
</body>
</html>
